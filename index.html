<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#e8735a">

<title>WEIBEAR</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23e8735a'/><text x='50' y='76' font-size='74' font-family='Arial Black,sans-serif' font-weight='900' fill='white' text-anchor='middle'>W</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--c-primary:#e8735a;--c-gold:#d4a843;--c-green:#6dbf67;--c-bg:#faf7f2;--c-card:#fff;--c-border:#e0dbd4;--c-text:#2d2a26;--c-sub:#999;--c-light:#f5f0ea;--c-danger:#d44;--font:'Noto Sans TC',sans-serif;--font-display:'Caveat','Noto Sans TC',cursive}
body{font-family:var(--font);background:linear-gradient(170deg,var(--c-bg) 0%,#f3ede3 100%);color:var(--c-text);min-height:100vh;min-height:100dvh;overflow-x:hidden}
input,select,button{font-family:var(--font);outline:none}
.app{max-width:520px;margin:0 auto;padding-bottom:100px}

/* Header */
.header{background:linear-gradient(135deg,var(--c-primary) 0%,var(--c-gold) 100%);padding:calc(env(safe-area-inset-top,20px) + 16px) 20px 20px;border-radius:0 0 28px 28px;box-shadow:0 8px 32px rgba(232,115,90,0.25)}
.header h1{font-family:var(--font-display);font-size:24px;font-weight:900;color:#fff}
.header .sub{font-size:12px;color:rgba(255,255,255,0.75);margin-top:4px}
.header-row{display:flex;justify-content:space-between;align-items:flex-start}
.header-actions{display:flex;gap:6px;flex-shrink:0}
.header-btn{background:rgba(255,255,255,0.2);border:none;border-radius:10px;padding:6px 10px;color:#fff;font-size:13px;cursor:pointer;font-weight:500}
.total-bar{margin-top:14px;background:rgba(255,255,255,0.2);border-radius:14px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.total-bar .label{color:rgba(255,255,255,0.85);font-size:13px}
.total-bar .amount{color:#fff;font-size:22px;font-weight:700}

/* Tabs */
.tabs{display:flex;margin:14px 16px 0;background:var(--c-card);border-radius:14px;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.tab-btn{flex:1;padding:10px 0;border:none;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;background:transparent;color:var(--c-sub);transition:all 0.2s}
.tab-btn.active{background:var(--c-primary);color:#fff}

/* Content */
.content{padding:12px 16px}

/* Cards */
.card{background:var(--c-card);border-radius:16px;padding:14px 16px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,0.04);cursor:pointer;display:flex;align-items:center;gap:12px;transition:transform 0.1s}
.card:active{transform:scale(0.98)}
.card-icon{font-size:28px;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-title{font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-sub{font-size:12px;color:var(--c-sub);margin-top:2px}
.card-amount{text-align:right;flex-shrink:0}
.card-amount .main{font-weight:700;font-size:16px;color:var(--c-primary)}
.card-amount .convert{font-size:11px;color:#bbb}

/* Buttons */
.btn-primary{padding:14px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;background:var(--c-primary);color:#fff;width:100%;box-shadow:0 4px 16px rgba(232,115,90,0.3);transition:all 0.15s}
.btn-primary:active{transform:scale(0.97)}
.btn-secondary{padding:10px 24px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;background:var(--c-light);color:var(--c-text)}
.btn-danger{background:transparent;border:none;color:var(--c-danger);font-size:14px;font-weight:600;cursor:pointer;padding:12px;width:100%}

/* Inputs */
.input{width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid var(--c-border);font-size:15px;background:var(--c-bg);transition:border-color 0.2s}
.input:focus{border-color:var(--c-primary)}
.input-big{text-align:center;letter-spacing:6px;font-size:22px;font-family:monospace;font-weight:700}
.label{font-size:13px;font-weight:600;color:#888;margin-bottom:6px;display:block}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:22px;font-size:14px;font-weight:500;background:var(--c-light);border:2px solid transparent;cursor:pointer;transition:all 0.15s;user-select:none;min-height:40px;touch-action:manipulation}
.badge.selected{border-color:var(--badge-color);background:color-mix(in srgb,var(--badge-color) 12%,white)}
.badge-avatar{width:24px;height:24px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.badge-lg{padding:4px 12px;font-size:14px;gap:6px;min-height:36px}
.badge-lg .badge-avatar{width:26px;height:26px;font-size:13px}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:20px;width:100%;max-width:440px;max-height:85vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,0.18);transform:translateY(20px);transition:transform 0.2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:20px 24px 12px;border-bottom:1px solid var(--c-light);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;border-radius:20px 20px 0 0;z-index:1}
.modal-header h3{font-size:18px;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--c-sub);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.modal-body{padding:16px 24px 24px}

/* Category pills */
.pill{padding:10px 14px;border-radius:10px;border:none;font-size:14px;cursor:pointer;background:var(--c-light);color:#666;transition:all 0.15s;min-height:40px;touch-action:manipulation}
.pill.active{background:var(--c-primary);color:#fff}

/* Settlement */
.settle-card{background:var(--c-card);border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.settle-title{margin:0 0 12px;font-size:15px;color:var(--c-sub)}
.settle-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--c-light)}
.settle-row:last-child{border-bottom:none}
.net-positive{color:var(--c-green);font-weight:700;font-size:15px}
.net-negative{color:var(--c-primary);font-weight:700;font-size:15px}
.net-zero{color:var(--c-sub);font-weight:700;font-size:15px}
.txn-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--c-light)}
.txn-row:last-child{border-bottom:none}
.txn-arrow{color:#ccc;font-size:18px}
.txn-amount{margin-left:auto;font-weight:700;font-size:16px;color:var(--c-primary)}

/* Empty states */
.empty{text-align:center;padding:40px 20px;color:#bbb}
.empty-icon{font-size:40px;margin-bottom:8px}

/* Landing */
.landing{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:0 20px;max-width:520px;margin:0 auto}
.landing-hero{text-align:center;padding-top:60px;margin-bottom:32px}
.landing-hero .icon{font-size:56px;margin-bottom:8px}
.landing-hero h1{font-family:var(--font-display);font-size:34px;font-weight:900;background:linear-gradient(135deg,var(--c-primary),var(--c-gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.landing-hero p{color:var(--c-sub);font-size:14px;margin-top:4px}
.landing-form{width:100%;display:flex;flex-direction:column;gap:14px}
.trip-item{width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--c-border);background:#fff;display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin-bottom:8px;transition:transform 0.1s}
.trip-item:active{transform:scale(0.98)}
.trip-item .name{font-weight:600;font-size:15px}
.trip-item .code{font-size:12px;color:#bbb;font-family:monospace}
.error-msg{background:#fff0ee;color:var(--c-danger);padding:10px 16px;border-radius:12px;font-size:14px;text-align:center;width:100%}
.back-btn{background:none;border:none;color:var(--c-sub);cursor:pointer;font-size:14px;padding:8px}
.btn-outline{padding:14px 24px;border-radius:14px;border:1.5px solid var(--c-border);font-size:16px;font-weight:700;cursor:pointer;background:#fff;color:var(--c-text);width:100%;box-shadow:0 2px 12px rgba(0,0,0,0.06)}

/* Share code display */
.share-code{font-size:36px;font-family:monospace;font-weight:700;letter-spacing:8px;color:var(--c-primary);padding:16px 0;background:var(--c-bg);border-radius:14px;margin:12px 0;text-align:center}

/* Member card in list */
.member-card{background:var(--c-card);border-radius:16px;padding:14px 16px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,0.04);display:flex;align-items:center;justify-content:space-between}
.member-info{display:flex;align-items:center;gap:8px}
.member-stats{text-align:right;font-size:13px;color:#888}
.remove-btn{background:none;border:none;font-size:18px;cursor:pointer;color:#ccc;padding:4px}
.me-tag{font-size:10px;color:var(--c-primary);font-weight:600}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;color:var(--c-sub)}

/* Flex helpers */
.flex{display:flex}.flex-wrap{flex-wrap:wrap}.gap-6{gap:6px}.gap-8{gap:8px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mb-12{margin-bottom:12px}.w-full{width:100%}

/* Paste batch */
.paste-btn{flex-shrink:0;padding:14px 16px;border-radius:14px;border:1.5px solid var(--c-border);background:#fff;color:var(--c-text);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.paste-textarea{width:100%;min-height:130px;padding:12px;border-radius:12px;border:1.5px solid var(--c-border);font-size:12px;font-family:monospace;background:var(--c-bg);resize:vertical;line-height:1.5}
.paste-textarea:focus{border-color:var(--c-primary);outline:none}
.paste-preview{margin-top:10px;max-height:180px;overflow-y:auto}
.paste-row{font-size:13px;padding:6px 10px;border-radius:8px;margin-bottom:4px;display:flex;align-items:flex-start;gap:6px;line-height:1.4;word-break:break-all}
.paste-ok{background:#f0fff4;color:#2d5a27}
.paste-err{background:#fff0f0;color:#8b2020}
.paste-icon{flex-shrink:0;font-size:13px;margin-top:1px}
.paste-hint{font-size:12px;color:var(--c-sub);line-height:1.6;background:var(--c-light);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.paste-hint code{background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:11px}
</style>
</head>
<body>

<div id="app"></div>

<script type="module">
// Firebase SDK
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";

// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyAUEifxnZiGdpQhE5d1ewA63aiGF7wQFnc",
  authDomain: "trip-account-82599.firebaseapp.com",
  projectId: "trip-account-82599",
  storageBucket: "trip-account-82599.firebasestorage.app",
  messagingSenderId: "1059663313277",
  appId: "1:1059663313277:web:952b7066af149d1fe83414"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// --- Constants ---
const CURRENCIES = [
  {code:"TWD",symbol:"NT$",name:"新台幣"},{code:"JPY",symbol:"¥",name:"日圓"},
  {code:"USD",symbol:"$",name:"美元"},{code:"EUR",symbol:"€",name:"歐元"},
  {code:"KRW",symbol:"₩",name:"韓元"},{code:"GBP",symbol:"£",name:"英鎊"},
  {code:"THB",symbol:"฿",name:"泰銖"},{code:"VND",symbol:"₫",name:"越南盾"},
  {code:"SGD",symbol:"S$",name:"新加坡幣"},{code:"HKD",symbol:"HK$",name:"港幣"},
  {code:"MYR",symbol:"RM",name:"馬來西亞令吉"},{code:"AUD",symbol:"A$",name:"澳幣"},
  {code:"CNY",symbol:"¥",name:"人民幣"},
];
const CATEGORIES = [
  {id:"food",icon:"🍽️",name:"餐飲"},{id:"transport",icon:"🚗",name:"交通"},
  {id:"hotel",icon:"🏨",name:"住宿"},{id:"ticket",icon:"🎫",name:"門票"},
  {id:"shopping",icon:"🛍️",name:"購物"},{id:"other",icon:"📦",name:"其他"},
];
const DEFAULT_RATES = {TWD:1,JPY:0.215,USD:32.5,EUR:35.2,KRW:0.024,GBP:41.0,THB:0.92,VND:0.0013,SGD:24.3,HKD:4.15,MYR:7.1,AUD:21.5,CNY:4.48};
const COLORS = ["#e8735a","#5b9bd5","#6dbf67","#d4a843","#a87ed4","#4ec6c1","#e07db5","#8a9a5b"];

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function genCode(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let r="";for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r}
function getColor(name){return COLORS[Math.abs([...name].reduce((a,c)=>a+c.charCodeAt(0),0))%COLORS.length]}
function today(){return new Date().toISOString().slice(0,10)}
// Format money: keep 2 decimals but trim trailing zeros (e.g. 100.00 -> 100, 1397.50 -> 1397.5)
function fmtMoney(n){
  const rounded=Math.round(n*100)/100;
  return rounded.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:2});
}
// Convert a TWD amount to the trip's display currency
function toDisplay(amtTWD,baseCurrency,rates){
  if(!baseCurrency||baseCurrency==="TWD")return amtTWD;
  const rate=rates[baseCurrency]||1;
  return amtTWD/rate;
}
// Get symbol for the display currency
function displaySymbol(baseCurrency){
  const c=CURRENCIES.find(x=>x.code===(baseCurrency||"TWD"));
  return c?c.symbol:"NT$";
}

// --- Local storage for "my trips" ---
function getMyTrips(){try{return JSON.parse(localStorage.getItem("my-trips"))||[]}catch{return[]}}
function saveMyTrips(t){localStorage.setItem("my-trips",JSON.stringify(t))}

// --- Settlement ---
function expRate(exp,rates){return exp.customRate||rates[exp.currency]||1}

function calcSettlement(members,expenses,rates){
  const bal={};members.forEach(m=>{bal[m.id]=0});
  expenses.forEach(exp=>{
    const amt=exp.amount*expRate(exp,rates);
    const sp=exp.splits.filter(s=>members.some(m=>m.id===s.memberId));
    if(!sp.length)return;
    bal[exp.paidBy]=(bal[exp.paidBy]||0)+amt;
    const tot=sp.reduce((s,x)=>s+x.ratio,0);
    sp.forEach(s=>{bal[s.memberId]=(bal[s.memberId]||0)-amt*(s.ratio/tot)});
  });
  const debtors=[],creditors=[];
  Object.entries(bal).forEach(([id,v])=>{if(v<-0.01)debtors.push({id,amount:-v});else if(v>0.01)creditors.push({id,amount:v})});
  debtors.sort((a,b)=>b.amount-a.amount);creditors.sort((a,b)=>b.amount-a.amount);
  const txns=[];let i=0,j=0;
  while(i<debtors.length&&j<creditors.length){
    const pay=Math.min(debtors[i].amount,creditors[j].amount);
    if(pay>0.01)txns.push({from:debtors[i].id,to:creditors[j].id,amount:Math.round(pay*100)/100});
    debtors[i].amount-=pay;creditors[j].amount-=pay;
    if(debtors[i].amount<0.01)i++;if(creditors[j].amount<0.01)j++;
  }
  return txns;
}

function perPersonCalc(members,expenses,rates){
  const pp={};members.forEach(m=>{pp[m.id]={paid:0,owe:0}});
  expenses.forEach(exp=>{
    const amt=exp.amount*expRate(exp,rates);
    if(pp[exp.paidBy])pp[exp.paidBy].paid+=amt;
    const sp=exp.splits.filter(s=>pp[s.memberId]);
    const tot=sp.reduce((s,x)=>s+x.ratio,0);
    sp.forEach(s=>{pp[s.memberId].owe+=amt*(s.ratio/tot)});
  });
  return pp;
}

// ===================== RENDERER =====================
const $=id=>document.getElementById(id);
const app=$("app");
let STATE={screen:"landing",tripCode:null,myMemberId:null,tripData:null,tab:"expenses",modal:null,editExpense:null,error:"",landingMode:null};
let unsubscribe=null;

function setState(patch){
  Object.assign(STATE,patch);
  render();
}

function badgeHTML(member,opts={}){
  const color=getColor(member.name);
  const cls=opts.selected?"badge selected":"badge";
  const lg=opts.large?" badge-lg":"";
  return `<div class="${cls}${lg}" style="--badge-color:${color}" ${opts.clickId?`data-click="${opts.clickId}"`:""}><span class="badge-avatar" style="background:${color}">${member.name[0]}</span>${member.name}</div>`;
}

// ===================== SCREENS =====================
function renderLoading(){
  app.innerHTML=`<div class="loading"><p>載入中...</p></div>`;
}

function renderLanding(){
  const myTrips=getMyTrips();
  const {error}=STATE;
  const mode=STATE.landingMode||null;

  let html=`<div class="landing"><div class="landing-hero"><div class="icon"><svg viewBox="0 0 100 100" width="56" height="56" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="22" fill="#e8735a"/><text x="50" y="76" font-size="74" font-family="Arial Black,sans-serif" font-weight="900" fill="white" text-anchor="middle">W</text></svg></div><h1>WEIBEAR</h1><p>多人共享 · 即時同步 · 自動結算</p></div>`;
  if(error)html+=`<div class="error-msg mb-12">${error}</div>`;

  if(!mode){
    html+=`<div class="landing-form">
      <button class="btn-primary" onclick="doSetMode('create')">🆕 建立新旅程</button>
      <button class="btn-outline" onclick="doSetMode('join')">🔗 加入旅程</button>`;
    if(myTrips.length){
      html+=`<div class="mt-16"><p style="font-size:13px;color:var(--c-sub);margin-bottom:8px;font-weight:600">最近的旅程</p>`;
      myTrips.forEach(t=>{
        html+=`<div class="trip-item" onclick="doRejoin('${t.code}','${t.myMemberId}')"><span class="name">${t.name}</span><div class="flex gap-8" style="align-items:center"><span class="code">${t.code}</span><button class="remove-btn" onclick="event.stopPropagation();doDeleteTrip('${t.code}')">✕</button></div></div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  } else if(mode==="create"){
    html+=`<div class="landing-form">
      <div><label class="label">旅程名稱</label><input class="input" id="tripName" placeholder="例：2026 東京自由行"></div>
      <div><label class="label">你的暱稱</label><input class="input" id="myName" placeholder="旅伴會看到的名字"></div>
      <button class="btn-primary" onclick="doCreate()">建立旅程</button>
      <button class="back-btn" onclick="doSetMode(null)">← 返回</button>
    </div>`;
  } else if(mode==="join"){
    html+=`<div class="landing-form">
      <div><label class="label">房間代碼</label><input class="input input-big" id="joinCode" placeholder="XXXXXX" maxlength="6" oninput="this.value=this.value.toUpperCase()"></div>
      <div><label class="label">你的暱稱</label><input class="input" id="joinName" placeholder="旅伴會看到的名字"></div>
      <button class="btn-primary" onclick="doJoin()">加入旅程</button>
      <button class="back-btn" onclick="doSetMode(null)">← 返回</button>
    </div>`;
  }
  html+=`</div>`;
  app.innerHTML=html;
}

function renderTrip(){
  const {tripData:td,tab,myMemberId}=STATE;
  if(!td)return renderLoading();
  const members=td.members||[];
  const expenses=td.expenses||[];
  const rates=td.rates||DEFAULT_RATES;
  const memberMap={};members.forEach(m=>{memberMap[m.id]=m});
  const myMember=memberMap[myMemberId]||{name:"?"};
  const totalTWD=expenses.reduce((s,e)=>s+e.amount*(rates[e.currency]||1),0);
  const pp=perPersonCalc(members,expenses,rates);
  const settlement=calcSettlement(members,expenses,rates);
  // Display currency is per-user (stored locally), each person sees their own preference
  const baseCurrency=localStorage.getItem(`displayCurrency-${STATE.tripCode}`)||"TWD";
  const symbol=displaySymbol(baseCurrency);

  let html=`<div class="app">
  <div class="header">
    <div class="header-row">
      <div style="flex:1;min-width:0">
        <div class="flex gap-8" style="align-items:center">
          <button class="header-btn" onclick="doLeave()">←</button>

        </div>

      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="openModal('share')">📤 邀請</button>

      </div>
    </div>
    <div class="total-bar"><span class="label">總花費（${baseCurrency}）</span><span class="amount">${symbol} ${fmtMoney(toDisplay(totalTWD,baseCurrency,rates))}</span></div>
  </div>

  <div class="tabs">
    <button class="tab-btn ${tab==="expenses"?"active":""}" onclick="setTab('expenses')">💰 消費</button>
    <button class="tab-btn ${tab==="members"?"active":""}" onclick="setTab('members')">👥 旅伴</button>
    <button class="tab-btn ${tab==="settle"?"active":""}" onclick="setTab('settle')">🤝 結算</button>
  </div>

  <div class="content">`;

  if(tab==="expenses"){
    html+=`<div class="flex gap-8 mb-12"><button class="btn-primary" style="flex:1" onclick="doAddExpense()">+ 新增消費</button><button class="paste-btn" onclick="openModal('paste')">📋 批次</button></div>`;

      html+=`<div class="empty"><div class="empty-icon">📝</div><p>還沒有消費紀錄</p></div>`;
    }
    [...expenses].reverse().forEach(exp=>{
      const cat=CATEGORIES.find(c=>c.id===exp.category)||CATEGORIES[5];
      const cur=CURRENCIES.find(c=>c.code===exp.currency)||CURRENCIES[0];
      const convHTML=exp.currency!=="TWD"?`<div class="convert">≈ ${symbol}${fmtMoney(toDisplay(exp.amount*expRate(exp,rates),baseCurrency,rates))}</div>`:"";
      const rateTag=exp.customRate?`<span style="font-size:10px;color:var(--c-gold);margin-left:4px" title="自訂匯率 1${exp.currency}=${exp.customRate}TWD">📌</span>`:"";
      html+=`<div class="card" onclick="doEditExpense('${exp.id}')">
        <span class="card-icon">${cat.icon}</span>
        <div class="card-body"><div class="card-title">${exp.description||cat.name}${rateTag}</div><div class="card-sub">${(memberMap[exp.paidBy]||{name:"?"}).name} 代付 · ${exp.date}</div></div>
        <div class="card-amount"><div class="main">${cur.symbol}${exp.amount.toLocaleString()}</div>${convHTML}</div>
      </div>`;
    });
  }

  if(tab==="members"){
    html+=`<button class="btn-primary mb-12" onclick="openModal('addMember')">+ 新增旅伴</button>`;
    members.forEach(m=>{
      const meTag=m.id===myMemberId?`<span class="me-tag">我</span>`:"";
      const removeBtn=m.id!==myMemberId?`<button class="remove-btn" onclick="event.stopPropagation();doRemoveMember('${m.id}','${m.name}')">✕</button>`:"";
      html+=`<div class="member-card">
        <div class="member-info">${badgeHTML(m,{large:true})}${meTag}</div>
        <div class="flex gap-8" style="align-items:center">
          <div class="member-stats"><div>代付 ${symbol}${fmtMoney(toDisplay(pp[m.id]?.paid||0,baseCurrency,rates))}</div><div>應付 ${symbol}${fmtMoney(toDisplay(pp[m.id]?.owe||0,baseCurrency,rates))}</div></div>
          ${removeBtn}
        </div>
      </div>`;
    });
  }

  if(tab==="settle"){
    if(members.length<2){
      html+=`<div class="empty"><div class="empty-icon">🤝</div><p>至少需要 2 位旅伴才能結算</p></div>`;
    }else if(!expenses.length){
      html+=`<div class="empty"><div class="empty-icon">📊</div><p>尚無消費紀錄</p></div>`;
    }else{
      html+=`<div class="settle-card"><h4 class="settle-title">📊 每人收支</h4>`;
      members.forEach(m=>{
        const netTWD=(pp[m.id]?.paid||0)-(pp[m.id]?.owe||0);
        const net=toDisplay(netTWD,baseCurrency,rates);
        const cls=net>0.01?"net-positive":net<-0.01?"net-negative":"net-zero";
        const meTag=m.id===myMemberId?` <span style="font-size:9px;color:var(--c-primary)">我</span>`:"";
        html+=`<div class="settle-row"><div class="flex gap-6" style="align-items:center">${badgeHTML(m)}${meTag}</div><span class="${cls}">${net>0?"+":""}${fmtMoney(net)} ${baseCurrency}</span></div>`;
      });
      html+=`</div>`;

      html+=`<div class="settle-card"><h4 class="settle-title">💸 最簡轉帳方式</h4>`;
      if(!settlement.length){
        html+=`<p style="color:#bbb;text-align:center;padding:16px">大家已經扯平了！🎉</p>`;
      }else{
        settlement.forEach(tx=>{
          const displayAmt=toDisplay(tx.amount,baseCurrency,rates);
          html+=`<div class="txn-row">${badgeHTML(memberMap[tx.from]||{name:"?"})}<span class="txn-arrow">→</span>${badgeHTML(memberMap[tx.to]||{name:"?"})}<span class="txn-amount">${symbol} ${fmtMoney(displayAmt)}</span></div>`;
        });
      }
      html+=`</div>`;
    }
  }

  html+=`</div></div>`;
  app.innerHTML=html;
}

// ===================== RENDER =====================
function render(){
  const {screen}=STATE;
  if(screen==="loading")renderLoading();
  else if(screen==="landing")renderLanding();
  else if(screen==="trip"){
    // Don't re-render trip page if a modal is open (would wipe modal state)
    if(STATE.modal){
      // Modal is open - skip full re-render to preserve user input
      return;
    }
    renderTrip();
  }
}

// ===================== ACTIONS =====================
window.doSetMode=function(mode){setState({landingMode:mode,error:""})};

window.doCreate=async function(){
  const name=$("tripName")?.value?.trim();
  const myName=$("myName")?.value?.trim();
  if(!name||!myName){setState({error:"請填寫旅程名稱和你的暱稱"});return}
  const code=genCode();
  const memberId=genId();
  const tripData={name,code,members:[{id:memberId,name:myName}],expenses:[],rates:DEFAULT_RATES,createdAt:Date.now()};
  await setDoc(doc(db,"trips",code),tripData);
  const trips=getMyTrips();trips.push({code,name,myMemberId:memberId});saveMyTrips(trips);
  enterTrip(code,memberId);
};

window.doJoin=async function(){
  const code=$("joinCode")?.value?.trim()?.toUpperCase();
  const myName=$("joinName")?.value?.trim();
  if(!code||!myName){setState({error:"請填寫房間代碼和你的暱稱"});return}
  const snap=await getDoc(doc(db,"trips",code));
  if(!snap.exists()){setState({error:"找不到此旅程，請確認代碼是否正確"});return}
  const data=snap.data();
  const existing=data.members.find(m=>m.name===myName);
  if(existing){
    const trips=getMyTrips().filter(t=>t.code!==code);trips.push({code,name:data.name,myMemberId:existing.id});saveMyTrips(trips);
    enterTrip(code,existing.id);return;
  }
  const memberId=genId();
  data.members.push({id:memberId,name:myName});
  await setDoc(doc(db,"trips",code),data);
  const trips=getMyTrips().filter(t=>t.code!==code);trips.push({code,name:data.name,myMemberId:memberId});saveMyTrips(trips);
  enterTrip(code,memberId);
};

window.doRejoin=async function(code,memberId){
  const snap=await getDoc(doc(db,"trips",code));
  if(!snap.exists()){setState({error:"此旅程已不存在"});return}
  enterTrip(code,memberId);
};

window.doDeleteTrip=function(code){
  if(!confirm("確定要從列表移除？"))return;
  saveMyTrips(getMyTrips().filter(t=>t.code!==code));
  setState({});
};

window.doLeave=function(){
  if(unsubscribe){unsubscribe();unsubscribe=null}
  setState({screen:"landing",tripCode:null,tripData:null,landingMode:null,modal:null});
};

function enterTrip(code,memberId){
  if(unsubscribe){unsubscribe();unsubscribe=null}
  STATE.tripCode=code;STATE.myMemberId=memberId;STATE.screen="trip";STATE.tab="expenses";STATE.modal=null;STATE.editExpense=null;
  unsubscribe=onSnapshot(doc(db,"trips",code),(snap)=>{
    if(snap.exists())setState({tripData:snap.data()});
  });
  render();
}

async function saveTripData(updater){
  const td=STATE.tripData;
  const next=typeof updater==="function"?updater(td):{...td,...updater};
  STATE.tripData=next;
  await setDoc(doc(db,"trips",STATE.tripCode),next);
}

window.setTab=function(t){setState({tab:t})};

window.openModal=function(m){STATE.modal=m;renderModal()};
window.closeModal=function(){
  const overlay=document.querySelector(".modal-overlay");
  if(overlay){overlay.classList.remove("open");setTimeout(()=>{overlay.innerHTML="";STATE.modal=null;STATE.editExpense=null},200)}
};

window.doCopy=function(){
  navigator.clipboard?.writeText(STATE.tripCode).then(()=>{
    const btn=$("copyBtn");if(btn){btn.textContent="✓ 已複製";btn.style.background="#6dbf67";setTimeout(()=>{btn.textContent="複製代碼";btn.style.background=""},2000)}
  });
};

window.doAddMember=async function(){
  const name=$("newMemberName")?.value?.trim();
  if(!name)return;
  await saveTripData(td=>({...td,members:[...td.members,{id:genId(),name}]}));
  closeModal();
};

window.doRemoveMember=async function(id,name){
  if(!confirm(`確定移除 ${name}？相關消費紀錄也會一併刪除`))return;
  await saveTripData(td=>({
    ...td,
    members:td.members.filter(m=>m.id!==id),
    expenses:td.expenses.map(e=>({...e,splits:e.splits.filter(s=>s.memberId!==id)})).filter(e=>e.paidBy!==id),
  }));
};

window.doUpdateRate=async function(code,val){
  const v=parseFloat(val)||0;
  await saveTripData(td=>({...td,rates:{...td.rates,[code]:v}}));
};

window.doFetchRates=async function(){
  const btn=document.getElementById("fetchRatesBtn");
  const status=document.getElementById("ratesFetchStatus");
  if(btn){btn.textContent="載入中...";btn.disabled=true}
  try{
    const res=await fetch("https://open.er-api.com/v6/latest/TWD");
    if(!res.ok)throw new Error("HTTP "+res.status);
    const data=await res.json();
    if(data.result!=="success")throw new Error("API error");
    const apiRates=data.rates;
    const newRates={...STATE.tripData.rates};
    CURRENCIES.filter(c=>c.code!=="TWD").forEach(c=>{
      if(apiRates[c.code]&&apiRates[c.code]>0){
        // apiRates[code] = how many of that currency per 1 TWD → invert to get TWD per 1 unit
        newRates[c.code]=Math.round((1/apiRates[c.code])*10000)/10000;
      }
    });
    const now=Date.now();
    await saveTripData(td=>({...td,rates:newRates,ratesUpdatedAt:now}));
    // Update input fields in modal
    CURRENCIES.filter(c=>c.code!=="TWD").forEach(c=>{
      const el=document.getElementById(`rate-${c.code}`);
      if(el)el.value=newRates[c.code]||0;
    });
    if(status)status.innerHTML=`<span style="color:var(--c-green)">✓ 已同步最新匯率（${new Date(now).toLocaleString("zh-TW",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})}）</span>`;
  }catch(e){
    if(status)status.innerHTML=`<span style="color:var(--c-danger)">同步失敗，請稍後再試</span>`;
  }
  if(btn){btn.textContent="🔄 同步最新匯率";btn.disabled=false}
};

window.doSetBaseCurrency=function(code){
  // Personal preference - stored locally per device
  localStorage.setItem(`displayCurrency-${STATE.tripCode}`,code);
  // Force re-render trip view (modal stays open via the early return in render())
  renderTrip();
  renderModal();
};

// --- Expense modal state ---
let expState={category:"food",paidBy:"",splitMembers:{},splitMode:"equal",customRatios:{},useCustomRate:false};

window.doAddExpense=function(){
  const members=STATE.tripData.members;
  if(members.length<2){alert("請先新增至少 2 位旅伴");setState({tab:"members"});return}
  STATE.editExpense=null;
  expState={category:"food",paidBy:members[0]?.id||"",splitMembers:Object.fromEntries(members.map(m=>[m.id,true])),splitMode:"equal",customRatios:{},useCustomRate:false};
  openModal("expense");
};

window.doEditExpense=function(id){
  const exp=STATE.tripData.expenses.find(e=>e.id===id);
  if(!exp)return;
  STATE.editExpense=exp;
  const allEqual=exp.splits.every(s=>s.ratio===exp.splits[0]?.ratio);
  expState={
    category:exp.category,paidBy:exp.paidBy,
    splitMembers:Object.fromEntries(exp.splits.map(s=>[s.memberId,true])),
    splitMode:allEqual?"equal":"custom",
    customRatios:Object.fromEntries(exp.splits.map(s=>[s.memberId,s.ratio])),
    useCustomRate:!!exp.customRate,
  };
  openModal("expense");
};

window.setExpField=function(field,val){
  expState[field]=val;
  if(field==="category"){
    document.querySelectorAll("#expenseCatArea .pill").forEach(el=>{
      el.classList.toggle("active",el.dataset.cat===val);
    });
  }
};

window.toggleExpCustomRate=function(useCustom){
  expState.useCustomRate=useCustom;
  document.getElementById("rateShared")?.classList.toggle("active",!useCustom);
  document.getElementById("rateCustom")?.classList.toggle("active",useCustom);
  const wrap=document.getElementById("customRateInputWrap");
  if(wrap)wrap.style.display=useCustom?"flex":"none";
};

window.onExpCurrencyChange=function(code){
  const row=document.getElementById("customRateRow");
  if(row)row.style.display=code==="TWD"?"none":"block";
  const cur=document.getElementById("customRateCur");
  if(cur)cur.textContent=code;
  const input=document.getElementById("expCustomRate");
  if(input){const r=STATE.tripData.rates[code]||1;input.placeholder=r;if(!expState.useCustomRate)input.value=r;}
};

window.setSplitMode=function(mode){
  expState.splitMode=mode;
  document.getElementById("splitEqual")?.classList.toggle("active",mode==="equal");
  document.getElementById("splitCustom")?.classList.toggle("active",mode==="custom");
  const cr=document.getElementById("customRatios");
  if(cr)cr.style.display=mode==="custom"?"block":"none";
  // Rebuild custom amount area if switching to custom
  if(mode==="custom"&&cr){
    const members=STATE.tripData.members.filter(m=>expState.splitMembers[m.id]);
    const totalAmt=parseFloat(document.getElementById("expAmount")?.value)||0;
    const currency=document.getElementById("expCurrency")?.value||"TWD";
    const symbol=(CURRENCIES.find(c=>c.code===currency)||CURRENCIES[0]).symbol;
    const evenSplit=members.length>0?Math.round((totalAmt/members.length)*100)/100:0;
    let h=`<p style="font-size:12px;color:var(--c-sub);margin-bottom:8px">直接輸入每個人應分擔的金額</p>`;
    members.forEach(m=>{
      const color=getColor(m.name);
      h+=`<div class="flex gap-8 mb-12" style="align-items:center"><div class="badge" style="--badge-color:${color}"><span class="badge-avatar" style="background:${color}">${m.name[0]}</span>${m.name}</div><input type="number" class="input" style="flex:1;max-width:120px" value="${evenSplit}" data-ratio="${m.id}" inputmode="decimal" placeholder="0" oninput="updateCustomSum()"><span style="font-size:12px;color:var(--c-sub)">${symbol}</span></div>`;
    });
    h+=`<div id="customSum" style="font-size:12px;color:var(--c-sub);text-align:right;margin-top:4px"></div>`;
    cr.innerHTML=h;
    updateCustomSum();
  }
};

// Show running total of custom amounts vs expense total
window.updateCustomSum=function(){
  const totalAmt=parseFloat(document.getElementById("expAmount")?.value)||0;
  const currency=document.getElementById("expCurrency")?.value||"TWD";
  const symbol=(CURRENCIES.find(c=>c.code===currency)||CURRENCIES[0]).symbol;
  let sum=0;
  document.querySelectorAll("[data-ratio]").forEach(el=>{sum+=parseFloat(el.value)||0});
  const sumEl=document.getElementById("customSum");
  if(!sumEl)return;
  const diff=Math.round((sum-totalAmt)*100)/100;
  if(Math.abs(diff)<0.01){
    sumEl.innerHTML=`✓ 合計 ${symbol}${sum.toLocaleString()}`;
    sumEl.style.color="#6dbf67";
  }else if(diff>0){
    sumEl.innerHTML=`合計 ${symbol}${sum.toLocaleString()}（多了 ${symbol}${diff.toLocaleString()}）`;
    sumEl.style.color="#d44";
  }else{
    sumEl.innerHTML=`合計 ${symbol}${sum.toLocaleString()}（少了 ${symbol}${(-diff).toLocaleString()}）`;
    sumEl.style.color="#d44";
  }
};

// Handle badge clicks in modal (paidby, split members)
document.addEventListener("click",function(e){
  const el=e.target.closest("[data-click]");
  if(!el)return;
  const click=el.dataset.click;
  if(click.startsWith("paidby-")){
    expState.paidBy=click.slice(7);
    // Update all paidby badges - deselect others, select this one
    document.querySelectorAll("#paidByArea [data-click]").forEach(b=>{
      b.classList.toggle("selected",b===el);
    });
  }
  if(click.startsWith("split-")){
    const mid=click.slice(6);
    expState.splitMembers[mid]=!expState.splitMembers[mid];
    el.classList.toggle("selected",expState.splitMembers[mid]);
  }
});

window.doSaveExpense=async function(){
  const desc=$("expDesc")?.value||"";
  const amount=parseFloat($("expAmount")?.value);
  const currency=$("expCurrency")?.value||"TWD";
  const date=$("expDate")?.value||today();
  if(!amount||!expState.paidBy){alert("請填寫金額並選擇代付人");return}
  const splitMembers=STATE.tripData.members.filter(m=>expState.splitMembers[m.id]);
  if(!splitMembers.length){alert("請選擇至少一位分帳成員");return}

  const ratioInputs=document.querySelectorAll("[data-ratio]");
  const ratios={};
  ratioInputs.forEach(el=>{ratios[el.dataset.ratio]=parseFloat(el.value)||1});

  const splits=splitMembers.map(m=>({
    memberId:m.id,
    ratio:expState.splitMode==="custom"?(ratios[m.id]||expState.customRatios[m.id]||1):1,
  }));

  const customRateVal=expState.useCustomRate&&currency!=="TWD"?parseFloat($("expCustomRate")?.value)||null:null;
  const exp={description:desc,amount,currency,category:expState.category,paidBy:expState.paidBy,splits,date,...(customRateVal?{customRate:customRateVal}:{customRate:null})};

  if(STATE.editExpense){
    await saveTripData(td=>({...td,expenses:td.expenses.map(e=>e.id===STATE.editExpense.id?{...exp,id:e.id}:e)}));
  }else{
    await saveTripData(td=>({...td,expenses:[...td.expenses,{...exp,id:genId()}]}));
  }
  closeModal();
};

window.doDeleteExpense=async function(){
  if(!confirm("確定刪除這筆消費？"))return;
  await saveTripData(td=>({...td,expenses:td.expenses.filter(e=>e.id!==STATE.editExpense.id)}));
  closeModal();
};

// ===================== PASTE BATCH =====================
function parseExpenseLines(text,members){
  return text.split('\n').map(l=>l.trim()).filter(l=>l.startsWith('TS|')).map(line=>{
    const parts=line.split('|');
    if(parts.length<8)return{ok:false,line,error:'欄位不足（需 8 欄）'};
    const [,desc,amtStr,currency,category,date,paidByName,splitsStr]=parts;
    const amount=parseFloat(amtStr);
    if(!amount||amount<=0)return{ok:false,line,error:'金額無效'};
    const cur=currency.trim().toUpperCase();
    if(!CURRENCIES.find(c=>c.code===cur))return{ok:false,line,error:`不支援幣別：${cur}`};
    const cat=category.trim().toLowerCase();
    if(!CATEGORIES.find(c=>c.id===cat))return{ok:false,line,error:`不支援類別：${cat}`};
    if(!/^\d{4}-\d{2}-\d{2}$/.test(date.trim()))return{ok:false,line,error:'日期格式錯誤（需 YYYY-MM-DD）'};
    const paidByMember=members.find(m=>m.name.trim().toLowerCase()===paidByName.trim().toLowerCase());
    if(!paidByMember)return{ok:false,line,error:`找不到成員：${paidByName.trim()}`};
    const sp=splitsStr.trim();
    let splits=[];
    if(sp.startsWith('equal:')){
      const names=sp.slice(6).split(',').map(n=>n.trim()).filter(Boolean);
      for(const n of names){
        const m=members.find(m=>m.name.trim().toLowerCase()===n.toLowerCase());
        if(!m)return{ok:false,line,error:`找不到成員：${n}`};
        splits.push({memberId:m.id,ratio:1});
      }
    }else if(sp.startsWith('custom:')){
      const pairs=sp.slice(7).split(',').map(p=>p.trim()).filter(Boolean);
      for(const pair of pairs){
        const eq=pair.lastIndexOf('=');
        if(eq===-1)return{ok:false,line,error:`custom 格式錯誤：${pair}`};
        const n=pair.slice(0,eq).trim();
        const ratio=parseFloat(pair.slice(eq+1));
        if(!ratio||ratio<=0)return{ok:false,line,error:`金額無效：${pair}`};
        const m=members.find(m=>m.name.trim().toLowerCase()===n.toLowerCase());
        if(!m)return{ok:false,line,error:`找不到成員：${n}`};
        splits.push({memberId:m.id,ratio});
      }
    }else{
      return{ok:false,line,error:'分帳格式錯誤（需 equal:... 或 custom:...）'};
    }
    if(!splits.length)return{ok:false,line,error:'分帳成員不能為空'};
    return{ok:true,line,exp:{id:genId(),description:desc.trim()||cat,amount,currency:cur,category:cat,date:date.trim(),paidBy:paidByMember.id,splits,customRate:null}};
  });
}

window.renderPastePreview=function(){
  const text=document.getElementById('pasteInput')?.value||'';
  const members=STATE.tripData?.members||[];
  const results=parseExpenseLines(text,members);
  const preview=document.getElementById('pastePreview');
  const btn=document.getElementById('pasteConfirmBtn');
  if(!results.length){
    if(preview)preview.innerHTML='';
    if(btn){btn.disabled=true;btn.textContent='請先貼上資料';}
    return;
  }
  const okCount=results.filter(r=>r.ok).length;
  let html='';
  results.forEach(r=>{
    if(r.ok){
      const cat=CATEGORIES.find(c=>c.id===r.exp.category)||CATEGORIES[5];
      const cur=CURRENCIES.find(c=>c.code===r.exp.currency)||CURRENCIES[0];
      const payer=(members.find(m=>m.id===r.exp.paidBy)||{name:'?'}).name;
      html+=`<div class="paste-row paste-ok"><span class="paste-icon">✓</span><span>${cat.icon} ${r.exp.description} · ${cur.symbol}${r.exp.amount.toLocaleString()} · ${payer} 代付 · ${r.exp.date}</span></div>`;
    }else{
      html+=`<div class="paste-row paste-err"><span class="paste-icon">✕</span><span>${r.error}<br><span style="opacity:.6;font-size:11px">${r.line.slice(0,60)}${r.line.length>60?'...':''}</span></span></div>`;
    }
  });
  if(preview)preview.innerHTML=html;
  if(btn){
    if(okCount>0){btn.disabled=false;btn.textContent=`確認新增 ${okCount} 筆${results.length>okCount?`（跳過 ${results.length-okCount} 筆錯誤）`:''}`;}
    else{btn.disabled=true;btn.textContent='沒有可匯入的資料';}
  }
};

window.doCopyTemplate=function(){
  const tmpl=window._pasteTemplate||'';
  navigator.clipboard?.writeText(tmpl).then(()=>{
    const btn=event.target;
    btn.textContent='✓ 已複製！貼給 AI 後把結果貼回下方';
    btn.style.color='var(--c-green)';
    setTimeout(()=>{btn.textContent='📄 複製 AI 提示範本';btn.style.color='';},3000);
  });
};

window.doConfirmPaste=async function(){
  const text=document.getElementById('pasteInput')?.value||'';
  const members=STATE.tripData?.members||[];
  const results=parseExpenseLines(text,members);
  const toAdd=results.filter(r=>r.ok).map(r=>r.exp);
  if(!toAdd.length)return;
  await saveTripData(td=>({...td,expenses:[...td.expenses,...toAdd]}));
  closeModal();
  setState({tab:'expenses'});
  alert(`✓ 已新增 ${toAdd.length} 筆消費`);
};

// ===================== INIT =====================
render();
</script>
